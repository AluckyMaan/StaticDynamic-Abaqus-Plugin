<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-label="Static to dynamic boundary conversion workflow">
  <rect width="1280" height="520" fill="#f7f9fb"/>
  <text x="64" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#172033">StaticDynamic v0.2.0 Workflow</text>
  <text x="64" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#526071">Geostatic result input to layered viscous-spring boundary conversion</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(64,150)">
      <rect width="190" height="120" rx="8" fill="#ffffff" stroke="#b8c4d3" stroke-width="2"/>
      <text x="24" y="42" font-size="22" font-weight="700" fill="#1b2b42">Boundary</text>
      <text x="24" y="72" font-size="16" fill="#4d5c6f">Detect 5 faces /</text>
      <text x="24" y="96" font-size="16" fill="#4d5c6f">3 edges automatically</text>
    </g>

    <g transform="translate(318,150)">
      <rect width="190" height="120" rx="8" fill="#ffffff" stroke="#b8c4d3" stroke-width="2"/>
      <text x="24" y="42" font-size="22" font-weight="700" fill="#1b2b42">Balance</text>
      <text x="24" y="72" font-size="16" fill="#4d5c6f">Read RF from ODB</text>
      <text x="24" y="96" font-size="16" fill="#4d5c6f">or CSV file</text>
    </g>

    <g transform="translate(572,150)">
      <rect width="190" height="120" rx="8" fill="#ffffff" stroke="#b8c4d3" stroke-width="2"/>
      <text x="24" y="42" font-size="22" font-weight="700" fill="#1b2b42">Check</text>
      <text x="24" y="72" font-size="16" fill="#4d5c6f">ODB Umax</text>
      <text x="24" y="96" font-size="16" fill="#4d5c6f">default 1.0e-4</text>
    </g>

    <g transform="translate(826,150)">
      <rect width="190" height="120" rx="8" fill="#ffffff" stroke="#b8c4d3" stroke-width="2"/>
      <text x="24" y="42" font-size="22" font-weight="700" fill="#1b2b42">Material</text>
      <text x="24" y="72" font-size="16" fill="#4d5c6f">Group layered</text>
      <text x="24" y="96" font-size="16" fill="#4d5c6f">boundary nodes</text>
    </g>

    <g transform="translate(1080,150)">
      <rect width="150" height="120" rx="8" fill="#ffffff" stroke="#b8c4d3" stroke-width="2"/>
      <text x="24" y="42" font-size="22" font-weight="700" fill="#1b2b42">Convert</text>
      <text x="24" y="72" font-size="16" fill="#4d5c6f">VS boundary</text>
      <text x="24" y="96" font-size="16" fill="#4d5c6f">+ RF loads</text>
    </g>

    <g stroke="#477db3" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M266 210 H304"/>
      <path d="M496 210 H558"/>
      <path d="M750 210 H812"/>
      <path d="M1004 210 H1066"/>
    </g>
    <g fill="#477db3">
      <path d="M304 210 l-12 -8 v16z"/>
      <path d="M558 210 l-12 -8 v16z"/>
      <path d="M812 210 l-12 -8 v16z"/>
      <path d="M1066 210 l-12 -8 v16z"/>
    </g>

    <g transform="translate(64,340)">
      <rect width="1166" height="90" rx="8" fill="#eaf3fb" stroke="#b7d3ea"/>
      <text x="28" y="38" font-size="20" font-weight="700" fill="#1b2b42">Output artifacts</text>
      <text x="28" y="66" font-size="17" fill="#40566e">ViscousBoundary node set, BoundaryInfo.csv, visual SpringDashpotToGround groups, SD_RF_* reaction-balance loads, converted CAE model</text>
    </g>
  </g>
</svg>
